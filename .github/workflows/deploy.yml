# Deploy estático (out/) para VPS — heitor.pelizaro.com.br
#
# Usa o Environment "vps" (igual ao Pronto Dental) para secrets/variables:
#   Settings → Environments → vps
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY  |  Opcional: VPS_SSH_PORT
# Variables: HEITOR_DEPLOY_PATH (default /var/www/heitor-pelizaro), NEXT_PUBLIC_*, etc.

name: Deploy heitor.pelizaro

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-heitor-pelizaro
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: vps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install and build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://heitor.pelizaro.com.br' }}
          NEXT_PUBLIC_GITHUB_URL: ${{ vars.NEXT_PUBLIC_GITHUB_URL }}
          NEXT_PUBLIC_EMAIL: ${{ vars.NEXT_PUBLIC_EMAIL }}
          NEXT_PUBLIC_PRONTO_DENTAL_URL: ${{ vars.NEXT_PUBLIC_PRONTO_DENTAL_URL }}
          NEXT_PUBLIC_LINKEDIN_URL: ${{ vars.NEXT_PUBLIC_LINKEDIN_URL }}
        run: |
          npm ci
          npm run build

      - name: Secrets obrigatórios (VPS)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e
          err=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Cadastre o secret VPS_HOST (mesmo valor do repositório Pronto-Dental)."
            err=1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::Cadastre o secret VPS_USER."
            err=1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Cadastre o secret VPS_SSH_KEY (chave privada OpenSSH completa, uma linha ou PEM multilinha)."
            err=1
          fi
          if [ "$err" -ne 0 ]; then
            echo "::notice::Configure os secrets no Environment \"vps\": Settings → Environments → vps → Environment secrets"
            echo "::notice::Ou em Repository secrets, se não usar environment."
            exit 1
          fi
          echo "Secrets VPS_HOST / VPS_USER / VPS_SSH_KEY OK (valores não são exibidos)."

      # ssh-keyscan pode falhar (firewall, rate limit, timeout). Com bash -e isso derrubava o job inteiro.
      # StrictHostKeyChecking=accept-new grava a host key na primeira conexão real (ssh/rsync).
      - name: SSH key
        env:
          DEPLOY_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ssh-keyscan -p ${{ env.SSH_PORT }} -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan OK"
          else
            echo "::warning::ssh-keyscan não obteve chave do host (comum com firewall). Seguindo com StrictHostKeyChecking=accept-new no SSH."
          fi

      - name: Ensure remote directory
        env:
          REMOTE_PATH: ${{ vars.HEITOR_DEPLOY_PATH }}
        run: |
          set -e
          DP="${REMOTE_PATH:-/var/www/heitor-pelizaro}"
          TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          ok=0
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              "$TARGET" \
              "sudo mkdir -p \"$DP\" && sudo chown -R \"\$USER:\$USER\" \"$DP\" || true"; then
              ok=1
              break
            fi
            echo "::notice::SSH tentativa $attempt/3 falhou; nova tentativa em 20s..."
            sleep 20
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Não foi possível SSH na VPS. Confira VPS_HOST (IPv4 público ou DNS público; Actions não alcança IP privado). Erro comum: Network is unreachable."
            exit 255
          fi

      - name: Rsync out/
        env:
          REMOTE_PATH: ${{ vars.HEITOR_DEPLOY_PATH }}
        run: |
          set -e
          DP="${REMOTE_PATH:-/var/www/heitor-pelizaro}"
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"
          ok=0
          for attempt in 1 2 3; do
            if rsync -azP --delete -e "$RSYNC_SSH" ./out/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$DP/"; then ok=1; break; fi
            echo "::notice::rsync tentativa $attempt/3 falhou; nova tentativa em 20s..."
            sleep 20
          done
          [ "$ok" -eq 1 ] || exit 255

      - name: Fix permissions and reload Nginx
        env:
          REMOTE_PATH: ${{ vars.HEITOR_DEPLOY_PATH }}
        run: |
          set -e
          DP="${REMOTE_PATH:-/var/www/heitor-pelizaro}"
          ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo chown -R www-data:www-data \"$DP\" && (sudo nginx -t && sudo systemctl reload nginx) || true"
