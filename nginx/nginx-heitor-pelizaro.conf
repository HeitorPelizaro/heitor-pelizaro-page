# =============================================================================
# Nginx — heitor.pelizaro.com.br (Next static export em HEITOR_ROOT_PLACEHOLDER)
# =============================================================================
# Publicado pelo workflow: .github/workflows/deploy.yml
# Cópia espelhada: Pronto Dental/deploy/nginx-heitor-pelizaro.conf (manter sincronizado)
# SSL: certbot no workflow (--nginx -d heitor.pelizaro.com.br)
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name heitor.pelizaro.com.br;

    server_tokens off;

    root HEITOR_ROOT_PLACEHOLDER;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        image/svg+xml;

    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /_next/static/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
